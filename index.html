<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Expense & Budget Visualizer</h1>
            <button id="theme-toggle" class="btn-theme">🌙 Mode</button>
        </header>

        <div class="card balance-card">
            <p class="label">TOTAL BALANCE</p>
            <h2 id="total-balance">$0.00</h2>
        </div>

        <div class="card form-card">
            <h3>Add Transaction</h3>
            <form id="transaction-form">
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="item-name" placeholder="e.g. Cilok" required>
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category" required onchange="checkNewCategory(this)">
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Fun">Fun</option>
                        <option value="custom">+ Add New Category...</option>
                    </select>
                </div>
                <div id="new-category-input" style="display:none; margin-bottom: 15px;">
                    <label>New Category Name</label>
                    <input type="text" id="custom-cat-name" placeholder="Name your category">
                </div>
                <button type="submit" class="btn-submit">Add Transaction</button>
            </form>
        </div>

        <div class="dashboard-grid">
            <div class="card list-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                    <h3 style="margin: 0; border: none;">Transactions</h3>
                    <select id="sort-by" onchange="updateUI()" style="width: auto; padding: 5px;">
                        <option value="newest">Newest</option>
                        <option value="highest">Highest Amount</option>
                    </select>
                </div>
                <div id="transaction-list" class="scrollable-list"></div>
            </div>
            <div class="card chart-card">
                <h3>Spending by Category</h3>
                <div class="chart-container">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
